name: Session 3 Validation

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/api-gateway/**'
  pull_request:
    paths:
      - 'infrastructure/api-gateway/**'

# NOTE: tools/jwt-generator is deliberately NOT built or tested by this
# workflow (or any other). It's a manually-run training CLI, not a platform
# service — see tools/jwt-generator/README.md.

jobs:
  test-api-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Guard — fail fast if spring-boot-starter-web was added to the Gateway
        run: |
          if grep -q "spring-boot-starter-web" infrastructure/api-gateway/pom.xml; then
            echo "::error::infrastructure/api-gateway/pom.xml contains spring-boot-starter-web. Spring Cloud Gateway uses WebFlux — adding the Servlet stack breaks startup. Remove this dependency."
            exit 1
          fi

      - name: Run API Gateway unit tests
        working-directory: infrastructure/api-gateway
        run: mvn -B test
