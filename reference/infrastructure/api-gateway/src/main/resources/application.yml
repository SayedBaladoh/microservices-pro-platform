# application.yml — API Gateway
# Session 2 — API Gateway & Routing
# Session 3 — adds: jwt.secret, spring.data.redis, RequestRateLimiter filter

server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://localhost:8888"
  data:
    redis:
      host: localhost
      port: 6379
      # In production: host from Config Server, password from Vault (Session 21).
      # This Redis instance backs RequestRateLimiter's token bucket counters —
      # NOT the response caching introduced in Session 8. Same tool, different
      # job; see docker-compose.yml for the full note.
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true          # DEV ONLY — auto-creates routes from Eureka for
                                  # convenience during labs/demos. In production,
                                  # use explicit routes only (discovery.locator.enabled:
                                  # true exposes every Eureka-registered service as a
                                  # route automatically — see Session 2 Daily Quiz Q6
                                  # and Session 3 trap S02-Q06 on this exact risk).
          lower-case-service-id: true
      routes:
        - id: product-service
          uri: lb://PRODUCT-SERVICE    # lb = load balanced via Eureka
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=0           # do not strip the path — Product Service
                                       # expects the same /api/v1/products/** path
            - AddResponseHeader=X-Platform, microservices-pro
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10   # 10 req/sec steady
                redis-rate-limiter.burstCapacity: 20    # up to 20 at once
                redis-rate-limiter.requestedTokens: 1   # each request costs 1 token
                key-resolver: "#{@ipKeyResolver}"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

jwt:
  secret: ${JWT_SECRET:microservices-pro-course-dev-secret-key-2026-min-256-bits}
  # DEV ONLY — this fallback value is a placeholder for local development and
  # training only. In production this comes from HashiCorp Vault (Session 21)
  # and is NEVER committed to git. NEVER reuse this string in any real system.
  #
  # CRITICAL: this exact fallback string must match the one in
  # tools/jwt-generator/.../JwtGeneratorApplication.java, or every token the
  # generator produces will fail signature validation here. Prefer setting
  # the JWT_SECRET environment variable identically in both places instead
  # of relying on the fallback at all.

