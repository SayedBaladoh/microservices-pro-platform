# docker-compose.yml
# Sessions 1-3.
#
# This repository follows OBG-001 (Curriculum Leakage Rule) strictly:
# infrastructure is only added to this file in the session that teaches it.
# Kafka does NOT belong here yet — it arrives in Session 7.
#
# A NOTE ON REDIS (added in Session 3, not Session 8):
# PROJECT_CONTEXT.md's service table lists "Redis cache added S8" — that
# entry is about Spring Cache / @Cacheable on Product Service, taught in
# Session 8. The Redis instance below is for a DIFFERENT concern: it backs
# Spring Cloud Gateway's RequestRateLimiter token bucket counters, which is
# Session 3 content (see Session_03_Gateway_Advanced.docx, "Rate Limiting
# with Redis"). Same tool, two unrelated jobs, taught in two different
# sessions — this is not curriculum leakage, it's the rate-limiting use
# case arriving in its own correct session. When Session 8 happens, this
# same Redis container will start serving a second purpose (response
# caching) on top of the one it already has here.
#
# Only PostgreSQL and Redis are containerized here. Eureka Server, Config
# Server, API Gateway, and Product Service all run directly on your machine
# via `mvn spring-boot:run` (or your IDE) through Session 8 — see
# docs/setup/local-setup.md. Containerizing the Spring Boot services
# themselves (Dockerfile per service) is Session 9 — do not add it early.

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: microservices_pro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
