# application.yml — Eureka Server
# Session 1 — Architecture & Spring Cloud
#
# This server does NOT register itself: it IS the registry.
# register-with-eureka: false / fetch-registry: false are how we tell it that.

server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    register-with-eureka: false   # server does not register itself
    fetch-registry: false
  server:
    enable-self-preservation: false  # DEV ONLY — disables Eureka's network-partition
                                      # safety net so deregistration is immediate during
                                      # labs/demos. NEVER set this to false in production —
                                      # it protects the registry during real network blips.

management:
  endpoints:
    web:
      exposure:
        include: health,info
