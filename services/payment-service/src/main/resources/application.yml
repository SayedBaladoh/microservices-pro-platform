# application.yml — Payment Service
# Session 4 — port, Eureka, Config Server, payment.failure-rate
# Session 5 — adds: payment.delay-ms (artificial slowness for TimeLimiter demo)
# Session 7 — adds: spring.kafka

server:
  port: 8083

spring:
  application:
    name: payment-service
  config:
    import: "optional:configserver:http://localhost:8888"

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${spring.application.name}  # see PaymentSagaHandler.java —
                                              # @KafkaListener overrides this
                                              # with groupId="payment-service"
                                              # explicitly anyway
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.microservices.pro.*"
      auto-offset-reset: earliest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

payment:
  failure-rate: 0.5  # 50% failure — change to 0.0 to test recovery (Session 4)
  delay-ms: 0         # 0 = no artificial delay. Session 5 demo sets this to
                       # 3000 (3s) to trigger the 2s TimeLimiter on Order Service.
                       # DEV ONLY — this is a test knob, never a real payment gateway setting.
