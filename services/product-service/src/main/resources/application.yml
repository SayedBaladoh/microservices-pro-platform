# application.yml — Product Service
# Session 1 — Architecture & Spring Cloud
#
# Port 8081: clients reach Product Service through the API Gateway (port 8080,
# added Session 2) via Eureka service discovery — they never need to know this
# port directly. See PROJECT_CONTEXT.md, Section 2, Platform Services table.

server:
  port: 8081

spring:
  application:
    name: product-service
  config:
    import: "optional:configserver:http://localhost:8888"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
